databases:
  - name: do-an-2-db
    plan: free
    region: oregon

services:
  # Backend API Service
  - type: web
    name: do-an-2-backend
    env: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python start.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: DATABASE_URL
        fromDatabase:
          name: do-an-2-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://do-an-2-1-xt7p.onrender.com
      - key: CORS_EXTRA_ORIGINS
        value: ""
      - key: DEFAULT_ADMIN_EMAIL
        value: admin@booking.com
      - key: DEFAULT_ADMIN_NAME
        value: Super Admin
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: DEFAULT_ADMIN_PASSWORD
        sync: false
      - key: ADMIN_BOOTSTRAP_TOKEN
        sync: false
      - key: SEED_ADMIN_TOKEN
        sync: false
    healthCheckPath: /
